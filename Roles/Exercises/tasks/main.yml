####################################################### New Exercise ########################################################
- name: ------- Install IIS on windows -------
  win_feature:
    name: Web-Server
    state: present
    include_sub_features: yes
  register: web_server
  tags: [install_iis]

- name: ------- Reboot if needed -------
  win_reboot:
  when: web_server.reboot_required
  tags: [reboot_iis]

- name: ------- copy default index file to iis root ------- 
  win_copy:
    src: index.html
    dest: "C:\\inetpub\\wwwroot\\index.html"
  tags: [default_web]

- name: ------- Create new website -------
  win_file:
    path: "C:\\inetpub\\wwwroot\\anisaweb"
    state: directory
  tags: [anisa_website]

- name: ------- copy my contet to anisa website -------
  win_copy:
    src: index.html
    dest: "C:\\inetpub\\wwwroot\\anisaweb\\index.html"
  tags: [default_web]

- name: ------- Create New Website -------
  win_iis_website:
    name: "Ansible Test Website"
    state: started
    port: 8080
    physical_path: "C:\\inetpub\\wwwroot\\anisaweb"
  tags: [new_website]


- name: ------- open port 8080 on windows Firewall -------
  win_firewall_rule:
    name: iis_new_website
    protocol: TCP
    direction: In
    localport: 8080
    action: Allow
    state: present
    force: yes
    enable: yes
  tags: [firewall]





